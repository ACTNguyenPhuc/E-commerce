spring:
  application:
    name: ecommerce-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecommerce_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      initialization-fail-timeout: 60000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc.time_zone: Asia/Ho_Chi_Minh
    show-sql: false

  flyway:
    enabled: false
    baseline-on-migrate: true
    repair: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 25MB

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-a-very-long-random-string-for-production-at-least-256-bits}
    access-ttl-minutes: 15
    refresh-ttl-days: 7
    issuer: ecommerce-backend
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    public-url: ${UPLOAD_PUBLIC_URL:/api/uploads}
  order:
    auto-cancel-pending-after-minutes: 30
    auto-complete-after-delivered-days: 7
  payment:
    vnpay:
      tmn-code: ${VNPAY_TMN_CODE:DEMO}
      hash-secret: ${VNPAY_HASH_SECRET:DEMOSECRET}
      pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      return-url: ${VNPAY_RETURN_URL:http://localhost:3000/payment/vnpay/return}

logging:
  level:
    root: INFO
    com.ecommerce: DEBUG
    org.hibernate.SQL: INFO
